<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <g transform="translate(96,100)">
    <!-- Diamond shape -->
    <polygon points="0,-52 48,-12 30,44 -30,44 -48,-12" fill="none" stroke="#06b6d4" stroke-width="5"/>
    <polygon points="0,-52 48,-12 30,44 -30,44 -48,-12" fill="#06b6d4" opacity="0.15"/>
    <!-- Top facets -->
    <line x1="-48" y1="-12" x2="48" y2="-12" stroke="#06b6d4" stroke-width="3"/>
    <line x1="0" y1="-52" x2="-18" y2="-12" stroke="#06b6d4" stroke-width="3"/>
    <line x1="0" y1="-52" x2="18" y2="-12" stroke="#06b6d4" stroke-width="3"/>
    <!-- Bottom facets -->
    <line x1="-18" y1="-12" x2="0" y2="44" stroke="#06b6d4" stroke-width="2.5" opacity="0.6"/>
    <line x1="18" y1="-12" x2="0" y2="44" stroke="#06b6d4" stroke-width="2.5" opacity="0.6"/>
    <!-- Shine -->
    <polygon points="-18,-12 0,-52 18,-12" fill="white" opacity="0.25"/>
  </g>
</svg>
