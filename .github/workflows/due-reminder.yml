name: Todo Due Reminder

on:
  schedule:
    # 7h, 11h, 14h heure Paris (UTC+2 en été)
    - cron: '0 5 * * *'   # 7h CEST
    - cron: '0 9 * * *'   # 11h CEST
    - cron: '0 12 * * *'  # 14h CEST
  workflow_dispatch:       # lancement manuel possible

permissions:
  contents: read

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch state.json and send reminder if needed
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, smtplib, os, urllib.request, base64
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from datetime import date

          # 1. Fetch state.json from repo
          repo = "albertmargaryanperso-ship-it/tracking-dashboard"
          url = f"https://api.github.com/repos/{repo}/contents/data/state.json"
          req = urllib.request.Request(url, headers={
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          })
          token = os.environ.get("GH_TOKEN")
          if token:
              req.add_header("Authorization", f"Bearer {token}")

          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())
              content = base64.b64decode(data["content"]).decode("utf-8")
              state = json.loads(content)

          # 2. Filter overdue/due-today todos
          today = date.today().isoformat()
          todos = state.get("todos", [])
          due_todos = [
              t for t in todos
              if t.get("status") != "done"
              and t.get("due")
              and t["due"] <= today
          ]

          if not due_todos:
              print(f"Aucune tâche à échéance <= {today}. Pas d'email.")
              exit(0)

          print(f"{len(due_todos)} tâche(s) à échéance. Envoi email...")

          # 3. Build HTML email
          CATEGORY_COLORS = {
              "pro": "#60a5fa", "finance": "#34d399", "admin": "#fbbf24",
              "automatisation": "#a78bfa", "sport": "#f472b6", "cardio": "#fb923c",
              "lecture": "#38bdf8", "bien-etre": "#2dd4bf",
          }
          CATEGORY_EMOJI = {
              "pro": "💼", "finance": "💰", "admin": "📋",
              "automatisation": "⚙️", "sport": "🏋️", "cardio": "🏃",
              "lecture": "📚", "bien-etre": "🧘",
          }

          def fmt_min(m):
              if not m or m <= 0: return ""
              if m < 60: return f"{m}min"
              h = m // 60
              r = m % 60
              return f"{h}h{str(r).zfill(2)}" if r else f"{h}h"

          def days_late(due_str):
              from datetime import datetime
              d = datetime.strptime(due_str, "%Y-%m-%d").date()
              delta = (date.today() - d).days
              return delta

          # Split overdue vs due today
          overdue = [t for t in due_todos if t["due"] < today]
          due_today = [t for t in due_todos if t["due"] == today]
          total_duration = sum(t.get("duration_min", 0) or 0 for t in due_todos)
          overdue_duration = sum(t.get("duration_min", 0) or 0 for t in overdue)
          today_duration = sum(t.get("duration_min", 0) or 0 for t in due_today)

          def build_task_html(t, show_late=False):
              cat = t.get("category", "admin")
              color = CATEGORY_COLORS.get(cat, "#94a3b8")
              emoji = CATEGORY_EMOJI.get(cat, "📋")
              label = cat.replace("-", " ").title().replace("Bien Etre", "Bien-être")
              due_date = t["due"].split("-")
              due_fr = f"{due_date[2]}/{due_date[1]}/{due_date[0]}"
              dur = fmt_min(t.get("duration_min"))
              dur_html = f' <span style="color:#06b6d4;font-weight:600">⏱ {dur}</span>' if dur else ""
              late_html = ""
              if show_late:
                  d = days_late(t["due"])
                  late_html = f' <span style="color:#f87171;font-weight:700;font-size:10px">({d}j de retard)</span>'
              return f'''<div style="border-left:3px solid {color};background:rgba(255,255,255,0.03);border-radius:8px;padding:12px 16px;margin-bottom:8px">
          <p style="font-size:13px;font-weight:600;margin:0;color:#e2e8f0">{emoji} {t.get("text","")}{dur_html}</p>
          <p style="font-size:11px;color:#64748b;margin:4px 0 0">{label} · échéance {due_fr}{late_html}</p>
          </div>'''

          items_html = ""

          if overdue:
              items_html += f'''<div style="margin-bottom:16px">
          <p style="font-size:11px;font-weight:700;color:#f87171;text-transform:uppercase;letter-spacing:1px;margin:0 0 8px">🔴 En retard ({len(overdue)})</p>'''
              for t in sorted(overdue, key=lambda x: x["due"]):
                  items_html += build_task_html(t, show_late=True)
              items_html += "</div>"

          if due_today:
              items_html += f'''<div style="margin-bottom:16px">
          <p style="font-size:11px;font-weight:700;color:#fbbf24;text-transform:uppercase;letter-spacing:1px;margin:0 0 8px">🟡 Aujourd'hui ({len(due_today)})</p>'''
              for t in sorted(due_today, key=lambda x: x.get("text", "")):
                  items_html += build_task_html(t)
              items_html += "</div>"

          # Recap durée
          recap_html = f'''<div style="background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.2);border-radius:10px;padding:14px 16px;margin-top:4px">
          <p style="font-size:11px;font-weight:700;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin:0 0 8px">Récap durées</p>
          <table style="width:100%;font-size:12px;color:#e2e8f0">
          <tr><td style="padding:2px 0">Total estimé</td><td style="text-align:right;font-weight:700;color:#06b6d4">{fmt_min(total_duration) or "—"}</td></tr>'''
          if overdue:
              recap_html += f'<tr><td style="padding:2px 0;color:#f87171">En retard</td><td style="text-align:right;font-weight:700;color:#f87171">{fmt_min(overdue_duration) or "—"}</td></tr>'
          if due_today:
              recap_html += f'<tr><td style="padding:2px 0;color:#fbbf24">Aujourd\'hui</td><td style="text-align:right;font-weight:700;color:#fbbf24">{fmt_min(today_duration) or "—"}</td></tr>'
          recap_html += "</table></div>"

          today_parts = today.split("-")
          today_fr = f"{today_parts[2]}/{today_parts[1]}/{today_parts[0]}"

          late_count = f" dont {len(overdue)} en retard" if overdue else ""

          html = f'''<div style="font-family:Inter,system-ui,sans-serif;background:#0f0f1a;color:#e2e8f0;padding:24px;max-width:500px;margin:0 auto">
          <h2 style="font-size:18px;margin:0 0 4px;color:#a78bfa">⚠️ {len(due_todos)} tâche(s) à traiter</h2>
          <p style="color:#64748b;font-size:12px;margin:0 0 20px">{today_fr}{late_count} — {fmt_min(total_duration) or "durée non estimée"}</p>
          {items_html}
          {recap_html}
          <p style="font-size:10px;color:#475569;margin:20px 0 0;text-align:center">📊 Tracking — rappel automatique (7h / 11h / 14h)</p>
          </div>'''

          # 4. Send email
          sender = os.environ["GMAIL_USER"]
          password = os.environ["GMAIL_APP_PASSWORD"]

          msg = MIMEMultipart("alternative")
          msg["Subject"] = f"⚠️ [Rappel] {len(due_todos)} tâche(s) à échéance — {today_fr}"
          msg["From"] = sender
          msg["To"] = sender
          msg.attach(MIMEText(html, "html"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(sender, password)
              server.sendmail(sender, sender, msg.as_string())

          print(f"✅ Email envoyé à {sender}")
          PYEOF
