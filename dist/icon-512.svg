<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a056"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
    <linearGradient id="check" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="clip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#787878"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="6" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#0f0f1a"/>
  <!-- Clipboard board -->
  <rect x="56" y="76" width="340" height="380" rx="28" fill="url(#board)" filter="url(#shadow)"/>
  <!-- Paper -->
  <rect x="80" y="112" width="292" height="328" rx="14" fill="url(#paper)"/>
  <!-- Lines on paper -->
  <line x1="108" y1="160" x2="344" y2="160" stroke="#ccc" stroke-width="3"/>
  <line x1="108" y1="200" x2="344" y2="200" stroke="#ccc" stroke-width="3"/>
  <line x1="108" y1="240" x2="344" y2="240" stroke="#ccc" stroke-width="3"/>
  <line x1="108" y1="280" x2="344" y2="280" stroke="#ccc" stroke-width="3"/>
  <line x1="108" y1="320" x2="344" y2="320" stroke="#ccc" stroke-width="3"/>
  <line x1="108" y1="360" x2="344" y2="360" stroke="#ccc" stroke-width="3"/>
  <line x1="108" y1="400" x2="344" y2="400" stroke="#ccc" stroke-width="3"/>
  <!-- Clip -->
  <rect x="156" y="52" width="140" height="52" rx="10" fill="url(#clip)"/>
  <rect x="180" y="60" width="92" height="36" rx="8" fill="#999"/>
  <!-- Check mark circle -->
  <g transform="translate(270, 260)">
    <circle cx="72" cy="72" r="90" fill="url(#check)" opacity="0.92" filter="url(#shadow)"/>
    <polyline points="30,72 60,102 115,42" fill="none" stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
